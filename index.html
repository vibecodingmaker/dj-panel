<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DJ Panel Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0A0A0F; --surface: #1A1A24; --surface-light: #2A2A3A;
      --cyan: #00FFFF; --magenta: #FF00FF; --yellow: #FFFF00;
      --green: #00FF88; --red: #FF3366; --orange: #FF9500;
      --text: #FFFFFF; --text-muted: #888899;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; user-select: none; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: var(--surface); border-bottom: 2px solid var(--cyan); }
    .logo { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 900; background: linear-gradient(90deg, var(--cyan), var(--magenta)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header-btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-upload { background: linear-gradient(135deg, var(--cyan), var(--magenta)); color: var(--bg); }
    main { display: grid; grid-template-columns: 1fr; gap: 10px; padding: 10px; }
    .deck { background: var(--surface); border-radius: 12px; padding: 12px; }
    .deck-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .deck-label { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700; color: var(--cyan); }
    .deck.b .deck-label { color: var(--magenta); }
    .bpm-display { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 900; color: var(--yellow); }
    .deck-content { display: flex; gap: 10px; margin-bottom: 10px; }
    .turntable { width: 100px; height: 100px; flex-shrink: 0; }
    .vinyl { width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at center, #333 0%, #111 60%); position: relative; }
    .vinyl.spinning { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .vinyl::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 35%; height: 35%; border-radius: 50%; background: linear-gradient(135deg, var(--cyan), var(--magenta)); }
    .waveform-container { flex: 1; background: var(--bg); border-radius: 8px; height: 50px; position: relative; overflow: hidden; }
    .waveform-progress { position: absolute; top: 0; left: 0; width: 0%; height: 100%; background: linear-gradient(90deg, rgba(0,255,255,0.2), rgba(0,255,255,0.3)); transition: width 0.1s linear; }
    .waveform { width: 100%; height: 100%; display: flex; align-items: center; gap: 1px; padding: 4px; }
    .waveform-bar { flex: 1; background: var(--cyan); border-radius: 1px; opacity: 0.6; }
    .deck.b .waveform-bar { background: var(--magenta); }
    .track-info { background: var(--bg); border-radius: 8px; padding: 8px 10px; margin-bottom: 10px; }
    .track-title { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
    .track-time { font-family: 'Orbitron', sans-serif; font-size: 11px; color: var(--yellow); }
    .transport { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
    .transport-btn { padding: 14px 8px; border: none; border-radius: 10px; font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.15s; min-height: 44px; }
    .play-btn { background: var(--surface-light); color: var(--text); }
    .play-btn.active { background: var(--green); color: var(--bg); box-shadow: 0 0 15px var(--green); }
    .cue-btn { background: var(--surface-light); color: var(--yellow); }
    .sync-btn { background: var(--surface-light); color: var(--magenta); }
    .pads-section { margin-bottom: 10px; }
    .pads-label { font-size: 10px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; }
    .pads-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .pad-btn { padding: 12px 8px; border: none; border-radius: 8px; font-size: 10px; font-weight: 700; cursor: pointer; min-height: 44px; }
    .pad-hotcue { background: var(--yellow); color: var(--bg); }
    .pad-loop { background: var(--green); color: var(--bg); }
    .pad-slice { background: var(--orange); color: var(--bg); }
    .pad-beatjump { background: var(--red); color: var(--text); }
    .pitch-control { display: flex; align-items: center; gap: 10px; }
    .pitch-display { font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 700; color: var(--green); min-width: 55px; text-align: center; }
    .pitch-slider { flex: 1; height: 12px; background: var(--surface-light); border-radius: 6px; appearance: none; cursor: pointer; }
    .pitch-slider::-webkit-slider-thumb { appearance: none; width: 28px; height: 28px; background: linear-gradient(135deg, var(--cyan), var(--magenta)); border-radius: 50%; cursor: pointer; }
    .mixer { background: var(--surface); border-radius: 12px; padding: 12px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .mixer-section { background: var(--bg); border-radius: 10px; padding: 10px; text-align: center; }
    .mixer-section h3 { font-size: 9px; color: var(--text-muted); margin-bottom: 8px; }
    .eq-strip { display: flex; justify-content: center; gap: 6px; margin-bottom: 8px; }
    .eq-knob { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #333, #111); border: 2px solid var(--surface-light); }
    .fader-container { width: 100%; height: 60px; background: var(--surface-light); border-radius: 6px; padding: 4px; display: flex; justify-content: center; }
    .fader { width: 10px; height: 100%; background: #333; border-radius: 5px; appearance: none; writing-mode: vertical-lr; direction: rtl; }
    .fader::-webkit-slider-thumb { appearance: none; width: 30px; height: 16px; background: linear-gradient(180deg, #fff, #ccc); border-radius: 4px; cursor: pointer; }
    .vu-meter { display: flex; gap: 2px; height: 40px; }
    .vu-bar { flex: 1; background: linear-gradient(to top, var(--green) 0%, var(--green) 60%, var(--yellow) 80%, var(--red) 100%); border-radius: 2px; align-self: flex-end; transition: height 0.05s; }
    .crossfader-label { display: flex; justify-content: space-between; font-size: 9px; margin-bottom: 4px; }
    .crossfader-label-a { color: var(--cyan); }
    .crossfader-label-b { color: var(--magenta); }
    .crossfader { width: 100%; height: 10px; background: var(--surface-light); border-radius: 5px; appearance: none; }
    .crossfader::-webkit-slider-thumb { appearance: none; width: 36px; height: 20px; background: linear-gradient(135deg, var(--cyan), var(--magenta)); border-radius: 5px; cursor: pointer; }
    .master-display { font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 900; color: var(--yellow); }
    .effects-panel { background: var(--surface); border-radius: 12px; padding: 12px; }
    .effects-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .effect-btn { padding: 12px 8px; background: var(--bg); border: 2px solid var(--surface-light); border-radius: 10px; color: var(--text); font-size: 10px; font-weight: 700; cursor: pointer; min-height: 50px; }
    .effect-btn.active { border-color: var(--magenta); background: rgba(255,0,255,0.15); }
    .footer-controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .footer-btn { padding: 12px; background: var(--bg); border: 2px solid var(--surface-light); border-radius: 10px; color: var(--text); font-family: 'Orbitron', sans-serif; font-size: 10px; cursor: pointer; min-height: 44px; }
    .sample-tracks { background: var(--surface); border-radius: 12px; padding: 12px; }
    .sample-tracks h3 { font-size: 12px; color: var(--green); margin-bottom: 10px; }
    .sample-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .sample-btn { padding: 10px; background: var(--bg); border: 2px solid var(--green); border-radius: 8px; color: var(--text); font-size: 11px; cursor: pointer; text-align: left; transition: all 0.15s; }
    .sample-btn:hover { background: rgba(0,255,136,0.1); }
    .sample-btn.playing { background: rgba(0,255,136,0.2); box-shadow: 0 0 10px rgba(0,255,136,0.3); }
    .sample-name { font-weight: 600; margin-bottom: 2px; }
    .sample-info { color: var(--text-muted); font-size: 10px; }
    .info-bar { background: var(--surface); border-radius: 8px; padding: 10px; text-align: center; font-size: 11px; color: var(--text-muted); }
    .info-bar span { color: var(--cyan); font-weight: 600; }
    @media (min-width: 768px) { main { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
  <header>
    <div class="logo">DJ PANEL PRO</div>
    <button class="header-btn btn-upload" onclick="document.getElementById('fileInput').click()">+ Import</button>
    <input type="file" id="fileInput" accept="audio/*" multiple style="display:none" onchange="handleFileSelect(this.files)">
  </header>
  
  <main>
    <div class="deck deck-a">
      <div class="deck-header">
        <span class="deck-label">DECK A</span>
        <span class="bpm-display" id="bpmA">--.-</span>
      </div>
      <div class="deck-content">
        <div class="turntable"><div class="vinyl" id="vinylA"></div></div>
        <div class="waveform-container">
          <div class="waveform-progress" id="progressA"></div>
          <div class="waveform" id="waveformA"></div>
        </div>
      </div>
      <div class="track-info">
        <div class="track-title" id="trackTitleA">Load a track below</div>
        <div class="track-time" id="timeA">0:00 / 0:00</div>
      </div>
      <div class="transport">
        <button class="transport-btn play-btn" id="playA" onclick="togglePlay('A')">PLAY</button>
        <button class="transport-btn cue-btn" onclick="cueDeck('A')">CUE</button>
        <button class="transport-btn sync-btn" id="syncA">SYNC</button>
      </div>
      <div class="pads-section">
        <div class="pads-label">Performance</div>
        <div class="pads-grid">
          <button class="pad-btn pad-hotcue" onclick="triggerPad('hotcue')">HOT CUE</button>
          <button class="pad-btn pad-loop" onclick="triggerPad('loop')">LOOP</button>
          <button class="pad-btn pad-slice" onclick="triggerPad('slice')">SLICE</button>
          <button class="pad-btn pad-beatjump" onclick="triggerPad('beatjump')">BEAT JUMP</button>
        </div>
      </div>
      <div class="pitch-control">
        <span class="pitch-display" id="pitchA">0.0%</span>
        <input type="range" class="pitch-slider" min="-8" max="8" value="0" oninput="updatePitch('A', this.value)">
      </div>
    </div>
    
    <div class="deck deck-b">
      <div class="deck-header">
        <span class="deck-label">DECK B</span>
        <span class="bpm-display" id="bpmB">--.-</span>
      </div>
      <div class="deck-content">
        <div class="turntable"><div class="vinyl" id="vinylB"></div></div>
        <div class="waveform-container">
          <div class="waveform-progress" id="progressB"></div>
          <div class="waveform" id="waveformB"></div>
        </div>
      </div>
      <div class="track-info">
        <div class="track-title" id="trackTitleB">Load a track below</div>
        <div class="track-time" id="timeB">0:00 / 0:00</div>
      </div>
      <div class="transport">
        <button class="transport-btn play-btn" id="playB" onclick="togglePlay('B')">PLAY</button>
        <button class="transport-btn cue-btn" onclick="cueDeck('B')">CUE</button>
        <button class="transport-btn sync-btn" id="syncB">SYNC</button>
      </div>
      <div class="pads-section">
        <div class="pads-label">Performance</div>
        <div class="pads-grid">
          <button class="pad-btn pad-hotcue" onclick="triggerPad('hotcue')">HOT CUE</button>
          <button class="pad-btn pad-loop" onclick="triggerPad('loop')">LOOP</button>
          <button class="pad-btn pad-slice" onclick="triggerPad('slice')">SLICE</button>
          <button class="pad-btn pad-beatjump" onclick="triggerPad('beatjump')">BEAT JUMP</button>
        </div>
      </div>
      <div class="pitch-control">
        <span class="pitch-display" id="pitchB">0.0%</span>
        <input type="range" class="pitch-slider" min="-8" max="8" value="0" oninput="updatePitch('B', this.value)">
      </div>
    </div>
    
    <div class="sample-tracks">
      <h3>GENERATED BEATS (Tap to Load)</h3>
      <div class="sample-list" id="sampleList"></div>
    </div>
    
    <div class="info-bar">
      <span>Web Audio API</span> - Beats synthesized locally in browser
    </div>
    
    <div class="mixer">
      <div class="mixer-section">
        <h3>EQ A</h3>
        <div class="eq-strip"><div class="eq-knob"></div><div class="eq-knob"></div><div class="eq-knob"></div></div>
        <div class="fader-container">
          <input type="range" class="fader" min="0" max="100" value="80" id="faderA" oninput="updateFader('A', this.value)">
        </div>
        <div class="vu-meter" id="vuA">
          <div class="vu-bar" style="height:30%"></div><div class="vu-bar" style="height:25%"></div>
          <div class="vu-bar" style="height:35%"></div><div class="vu-bar" style="height:20%"></div>
          <div class="vu-bar" style="height:15%"></div>
        </div>
      </div>
      <div class="mixer-section">
        <h3>Crossfader</h3>
        <div class="crossfader-label"><span class="crossfader-label-a">A</span><span class="crossfader-label-b">B</span></div>
        <input type="range" class="crossfader" min="0" max="100" value="50" id="crossfader" oninput="updateCrossfader(this.value)">
        <div class="master-display" id="masterDb">0 dB</div>
      </div>
      <div class="mixer-section">
        <h3>EQ B</h3>
        <div class="eq-strip"><div class="eq-knob"></div><div class="eq-knob"></div><div class="eq-knob"></div></div>
        <div class="fader-container">
          <input type="range" class="fader" min="0" max="100" value="75" id="faderB" oninput="updateFader('B', this.value)">
        </div>
        <div class="vu-meter" id="vuB">
          <div class="vu-bar" style="height:25%"></div><div class="vu-bar" style="height:30%"></div>
          <div class="vu-bar" style="height:20%"></div><div class="vu-bar" style="height:28%"></div>
          <div class="vu-bar" style="height:18%"></div>
        </div>
      </div>
    </div>
    
    <div class="effects-panel">
      <div class="effects-grid">
        <button class="effect-btn" onclick="toggleEffect('reverb')">REVERB</button>
        <button class="effect-btn" onclick="toggleEffect('delay')">DELAY</button>
        <button class="effect-btn" onclick="toggleEffect('flanger')">FLANGER</button>
        <button class="effect-btn" onclick="toggleEffect('filter')">FILTER</button>
      </div>
    </div>
    
    <div class="footer-controls">
      <button class="footer-btn">LOOP</button>
      <button class="footer-btn">SAMPLER</button>
      <button class="footer-btn">BROWSER</button>
    </div>
  </main>
  
  <script>
    let audioCtx = null;
    function getAudioContext() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }
    
    const state = {
      deckA: { playing: false, gainNodes: null, startTime: 0, bpm: 124, type: 'house' },
      deckB: { playing: false, gainNodes: null, startTime: 0, bpm: 130, type: 'techno' }
    };
    
    const sampleTracks = [
      { name: 'Deep House', artist: 'Synth', bpm: 124, type: 'house' },
      { name: 'Techno Beat', artist: 'Synth', bpm: 130, type: 'techno' },
      { name: 'Lo-Fi Chill', artist: 'Synth', bpm: 85, type: 'lofi' },
      { name: 'Drum & Bass', artist: 'Synth', bpm: 174, type: 'dnb' },
      { name: 'Funk Groove', artist: 'Synth', bpm: 110, type: 'funk' },
      { name: 'Trap Beat', artist: 'Synth', bpm: 140, type: 'trap' }
    ];
    
    let beatIntervals = { A: null, B: null };
    
    function startBeat(deck) {
      const ctx = getAudioContext();
      const s = state['deck' + deck];
      if (beatIntervals[deck]) clearInterval(beatIntervals[deck]);
      
      const masterGain = ctx.createGain();
      masterGain.gain.value = 0.4;
      masterGain.connect(ctx.destination);
      s.gainNodes = masterGain;
      
      let beat = 0;
      const beatLen = 60 / s.bpm;
      
      const playBeat = () => {
        if (!state['deck' + deck].playing) return;
        const now = ctx.currentTime;
        
        // Kick on 1, 3
        if (beat % 4 === 0 || beat % 4 === 2) {
          const k = ctx.createOscillator();
          const kg = ctx.createGain();
          k.frequency.setValueAtTime(150, now);
          k.frequency.exponentialRampToValueAtTime(40, now + 0.1);
          kg.gain.setValueAtTime(1, now);
          kg.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
          k.connect(kg); kg.connect(masterGain);
          k.start(now); k.stop(now + 0.15);
        }
        
        // Snare on 2, 4
        if (beat % 4 === 1 || beat % 4 === 3) {
          const buf = ctx.createBuffer(1, ctx.sampleRate * 0.1, ctx.sampleRate);
          const d = buf.getChannelData(0);
          for (let i = 0; i < d.length; i++) d[i] = (Math.random() - 0.5) * 0.5;
          const sn = ctx.createBufferSource();
          const sg = ctx.createGain();
          sn.buffer = buf;
          sg.gain.setValueAtTime(0.5, now);
          sg.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
          sn.connect(sg); sg.connect(masterGain);
          sn.start(now);
        }
        
        // Hi-hat
        const hbuf = ctx.createBuffer(1, ctx.sampleRate * 0.02, ctx.sampleRate);
        const hd = hbuf.getChannelData(0);
        for (let i = 0; i < hd.length; i++) hd[i] = (Math.random() - 0.5) * 0.2;
        const hh = ctx.createBufferSource();
        const hg = ctx.createGain();
        const hf = ctx.createBiquadFilter();
        hf.type = 'highpass'; hf.frequency.value = 9000;
        hh.buffer = hbuf;
        hg.gain.setValueAtTime(0.15, now);
        hg.gain.exponentialRampToValueAtTime(0.01, now + 0.02);
        hh.connect(hf); hf.connect(hg); hg.connect(masterGain);
        hh.start(now);
        
        // Bass
        const bassNotes = [55, 55, 73, 65];
        const bassIdx = Math.floor(beat / 4) % 4;
        const b = ctx.createOscillator();
        const bg = ctx.createGain();
        b.type = 'sawtooth';
        b.frequency.value = bassNotes[bassIdx];
        bg.gain.setValueAtTime(0.3, now);
        bg.gain.exponentialRampToValueAtTime(0.01, now + beatLen * 0.9);
        b.connect(bg); bg.connect(masterGain);
        b.start(now); b.stop(now + beatLen * 0.9);
        
        beat = (beat + 1) % 16;
      };
      
      playBeat();
      beatIntervals[deck] = setInterval(playBeat, beatLen * 1000);
    }
    
    function stopBeat(deck) {
      state['deck' + deck].playing = false;
      if (beatIntervals[deck]) {
        clearInterval(beatIntervals[deck]);
        beatIntervals[deck] = null;
      }
    }
    
    function initWaveform(id) {
      const wave = document.getElementById(id);
      wave.innerHTML = '';
      for (let i = 0; i < 40; i++) {
        const bar = document.createElement('div');
        bar.className = 'waveform-bar';
        bar.style.height = (20 + Math.random() * 60) + '%';
        wave.appendChild(bar);
      }
    }
    
    function renderSampleList() {
      const list = document.getElementById('sampleList');
      list.innerHTML = sampleTracks.map((t, i) => `
        <button class="sample-btn" onclick="loadToDeck('A', ${i})">
          <div class="sample-name">${t.name}</div>
          <div class="sample-info">${t.artist} | ${t.bpm} BPM</div>
        </button>
      `).join('');
    }
    
    function loadToDeck(deck, idx) {
      const t = sampleTracks[idx];
      const s = state['deck' + deck];
      s.bpm = t.bpm;
      s.type = t.type;
      
      document.getElementById('trackTitle' + deck).textContent = t.name + ' - ' + t.artist;
      document.getElementById('bpm' + deck).textContent = t.bpm.toFixed(2);
      document.getElementById('time' + deck).textContent = '0:00 / 3:00';
      
      document.querySelectorAll('.sample-btn').forEach((b, i) => b.classList.toggle('playing', i === idx));
      
      if (s.playing) { stopBeat(deck); setTimeout(() => togglePlay(deck), 50); }
    }
    
    function togglePlay(deck) {
      const s = state['deck' + deck];
      const btn = document.getElementById('play' + deck);
      const vinyl = document.getElementById('vinyl' + deck);
      const progress = document.getElementById('progress' + deck);
      
      if (s.playing) {
        stopBeat(deck);
        btn.classList.remove('active');
        btn.textContent = 'PLAY';
        vinyl.classList.remove('spinning');
      } else {
        s.playing = true;
        btn.classList.add('active');
        btn.textContent = 'PAUSE';
        vinyl.classList.add('spinning');
        startBeat(deck);
        updateProgress(deck, progress);
        startVUMeter(deck);
      }
    }
    
    function cueDeck(deck) {
      stopBeat(deck);
      document.getElementById('play' + deck).classList.remove('active');
      document.getElementById('play' + deck).textContent = 'PLAY';
      document.getElementById('vinyl' + deck).classList.remove('spinning');
      document.getElementById('progress' + deck).style.width = '0%';
      document.getElementById('time' + deck).textContent = '0:00 / 3:00';
    }
    
    function updateProgress(deck, progressEl) {
      const s = state['deck' + deck];
      const startTime = Date.now();
      const update = () => {
        if (s.playing) {
          const elapsed = (Date.now() - startTime) / 1000;
          progressEl.style.width = Math.min((elapsed / 180) * 100, 100) + '%';
          const cm = Math.floor(elapsed / 60), cs = Math.floor(elapsed % 60);
          document.getElementById('time' + deck).textContent = cm + ':' + (cs < 10 ? '0' : '') + cs + ' / 3:00';
          requestAnimationFrame(update);
        }
      };
      requestAnimationFrame(update);
    }
    
    function startVUMeter(deck) {
      const vu = document.getElementById('vu' + deck);
      const bars = vu.querySelectorAll('.vu-bar');
      const animate = () => {
        if (state['deck' + deck].playing) {
          bars.forEach(b => b.style.height = (20 + Math.random() * 70) + '%');
        }
        if (state['deck' + deck].playing) requestAnimationFrame(animate);
      };
      requestAnimationFrame(animate);
    }
    
    function updatePitch(deck, val) {
      document.getElementById('pitch' + deck).textContent = (val >= 0 ? '+' : '') + val + '%';
    }
    
    function updateFader(deck, val) {
      if (state['deck' + deck].gainNodes) {
